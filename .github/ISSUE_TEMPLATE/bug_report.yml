name: Bug report
description: Report a bug in AgenticFlowX
labels: [bug]
body:
  - type: input
    id: title
    attributes:
      label: What happened?
      placeholder: Short description of the bug
    validations:
      required: true

  - type: textarea
    id: describe
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open VS Code
        2. Run command '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: VS Code version, OS, extension version
      placeholder: |
        - VS Code: 1.96.0
        - OS: macOS 15.3
        - AFX version: 2.0.0
    validations:
      required: true
