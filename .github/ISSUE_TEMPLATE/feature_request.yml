name: Feature request
description: Suggest a new feature or enhancement
labels: [enhancement]
body:
  - type: input
    id: title
    attributes:
      label: Feature summary
      placeholder: Short description of the feature
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you have considered?
    validations:
      required: false
